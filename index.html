<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>דוגמאות TTS - VoiceCraft</title>
    <style>
        /* עיצוב בהשראת האתר המקורי */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 900px; margin: 0 auto; padding: 40px; line-height: 1.6; background: #fff; color: #222; }
        h1 { text-align: center; color: #000; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        th, td { border: 1px solid #eee; padding: 15px; text-align: right; }
        th { background-color: #f9f9f9; font-weight: 600; }
        audio { width: 220px; height: 35px; }
        .transcript { font-style: italic; color: #555; background: #fcfcfc; padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>יצירת קול סינתטי בעברית</h1>
    <h1>אדם סידי דניאלה סוקייניק </h1>
    <p>בדף זה ניתן לשמוע דוגמאות של סינתזת דיבור המבוססת על ארכיטקטורת VoiceCraft.</p>

    <table>
        <thead>
            <tr>
                <th>טקסט (Transcript)</th>
                <th>תוצאה (Generated Audio)</th>
                <th>מודל/שיטה</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="transcript">"הטקסט שאמרתי בדוגמה הזו"</td>
                <td><audio controls src="audio/example1.wav"></audio></td>
                <td>F5-TTS Fine-tuned</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
